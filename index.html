<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MSC — Mountain Safety Collective</title>
  <meta name="description" content="Backcountry conditions, snowpack advisories and safety information for the Australian Alps. Unofficial personal app.">
  <meta name="theme-color" content="#0d1a2b">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MSC">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="app-header">
    <img class="logo" src="icons/msc-logo.png" alt="Mountain Safety Collective">
    <div class="brand-tag">Backcountry bulletin<small>Australian Alps</small></div>
    <div class="header-spacer"></div>
    <a class="sos-pill" href="#/safety" aria-label="Emergency and safety information">SOS</a>
  </header>

  <main id="view" aria-live="polite">
    <noscript><p style="padding:16px">This app needs JavaScript enabled.</p></noscript>
  </main>

  <nav id="tabbar" class="tabbar" aria-label="Main navigation"></nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
